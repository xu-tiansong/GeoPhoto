<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GeoPhoto</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="style.css">
    <!-- 先加载 Leaflet，再加载插件 -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <!-- 3D 地球（缩小时显示），原生 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- 加载遮罩层 -->
    <div id="loading-overlay" class="hidden">
        <div class="loading-spinner"></div>
        <div class="loading-text" data-i18n="loading.scanning">Scanning files...</div>
    </div>
    <div id="map"></div>
    <!-- 3D 地球容器（缩小到底时覆盖在地图上）+ 提示与返回按钮 -->
    <div id="globe-container" class="hidden">
        <div id="globe-hint" data-i18n="globe.hint">拖动旋转地球 · 滚轮放大 · 点击球面进入该位置</div>
        <button id="globe-back-btn" data-i18n="globe.back">返回地图</button>
    </div>
    <!-- 设置地图中心经线 -->
    <div id="meridian-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-title" data-i18n="meridian.title">设置地图中心经线</div>
            <div class="modal-desc" data-i18n="meridian.desc">地图以这根经线为中心，向两边各展开 180°。</div>
            <div class="modal-row">
                <label data-i18n="meridian.label">中心经线（经度°）</label>
                <input type="number" id="meridian-input" min="-180" max="180" step="1" value="0">
            </div>
            <input type="range" id="meridian-slider" min="-180" max="180" step="1" value="0">
            <div class="meridian-presets">
                <button data-m="0" data-i18n="meridian.preset.greenwich">本初子午线 0°</button>
                <button data-m="180" data-i18n="meridian.preset.dateline">国际日界线 180°</button>
                <button id="meridian-use-current" data-i18n="meridian.useCurrent">用当前地图中心</button>
            </div>
            <div class="modal-actions">
                <button id="meridian-cancel" data-i18n="meridian.cancel">取消</button>
                <button id="meridian-ok" class="primary" data-i18n="meridian.ok">确定</button>
            </div>
        </div>
    </div>
    <div id="timeline-container">
        <div id="timeline-arrow-left" class="timeline-arrow">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div id="timeline-upper-row"></div>
        <div id="timeline-lower-row"></div>
        <div id="timeline-scrollbar">
            <div id="timeline-thumb">
                <div class="thumb-handle left"></div>
                <div class="thumb-handle right"></div>
            </div>
        </div>
        <div id="timeline-arrow-right" class="timeline-arrow">
            <svg viewBox="0 0 24 24" width="24" height="24">
                <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </div>

    <!-- 人脸扫描进度指示器（固定在地图左下角） -->
    <div id="face-scan-overlay">
        <div id="face-scan-title" data-i18n="face.scan.title">全局扫描</div>
        <canvas id="face-scan-canvas" width="128" height="128"></canvas>
        <div id="face-scan-text"></div>
        <button id="face-scan-cancel" data-i18n="face.scan.cancel">取消</button>
    </div>

    <!-- 重复照片移除进度指示器（固定在地图右下角） -->
    <div id="dup-scan-overlay">
        <div id="dup-scan-title" data-i18n="dup.scan.title">移除重复</div>
        <canvas id="dup-scan-canvas" width="128" height="128"></canvas>
        <div id="dup-scan-text"></div>
        <button id="dup-scan-stop" data-i18n="dup.scan.stop">终止</button>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
