        // ── 左右面板分隔条拖拽 ────────────────────────────────────
        (function () {
            const divider = document.getElementById('splitDivider');
            const sidebar = document.querySelector('.sidebar');
            const SIDEBAR_MIN = 240;
            const SIDEBAR_MAX = 800;
            const STORAGE_KEY = 'photoWindow.sidebarWidth';

            // 恢复上次宽度
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) sidebar.style.width = saved + 'px';

            let dragging = false;
            let startX = 0;
            let startWidth = 0;

            divider.addEventListener('mousedown', (e) => {
                dragging = true;
                startX = e.clientX;
                startWidth = sidebar.offsetWidth;
                divider.classList.add('dragging');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                // 拖条在sidebar左侧，向左拖 → sidebar变宽
                const delta = startX - e.clientX;
                const newWidth = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, startWidth + delta));
                sidebar.style.width = newWidth + 'px';
            });

            document.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                divider.classList.remove('dragging');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                localStorage.setItem(STORAGE_KEY, sidebar.offsetWidth);
                // 刷新地图（若可见）
                if (miniMap) setTimeout(() => miniMap.invalidateSize(), 50);
            });
        })();

        // ── Tag Management ───────────────────────────────────
        async function loadPhotoTags(photoId) {
            const container = document.getElementById('tags-container');
            container.innerHTML = '';
            try {
                const res = await ipcRenderer.invoke('get-photo-tags', { photoId });
                if (res.success && res.tags.length > 0) {
                    res.tags.forEach(tag => container.appendChild(createTagPill(tag, photoId)));
                }
            } catch (e) {
                console.error('Failed to load tags:', e);
            }
        }

        function createTagPill(tag, photoId) {
            const pill = document.createElement('div');
            pill.className = 'tag-pill';
            pill.dataset.tagId = tag.id;
            pill.style.borderColor = tag.color || '#383838';

            const dot = document.createElement('span');
            dot.className = 'tag-dot';
            dot.style.backgroundColor = tag.color || '#3498db';
            pill.appendChild(dot);

            const name = document.createElement('span');
            name.textContent = tag.name;
            pill.appendChild(name);

            const removeBtn = document.createElement('button');
            removeBtn.className = 'tag-remove';
            removeBtn.textContent = '\u00d7';
            removeBtn.addEventListener('click', async () => {
                const res = await ipcRenderer.invoke('unlink-tag-from-photo', { photoId, tagId: tag.id });
                if (res.success) pill.remove();
            });
            pill.appendChild(removeBtn);

            return pill;
        }

        document.querySelector('.add-tag-btn').addEventListener('click', async () => {
            if (!currentPhoto || !currentPhoto.id) return;
            await ipcRenderer.invoke('open-tag-select-window', { photoId: currentPhoto.id });
        });

        ipcRenderer.on('tag-removed', (_event, { tagId }) => {
            const container = document.getElementById('tags-container');
            const pill = container.querySelector(`[data-tag-id="${tagId}"]`);
            if (pill) pill.remove();
        });

        ipcRenderer.on('tag-added', async (_event, tagInfo) => {
            if (!currentPhoto) return;
            const container = document.getElementById('tags-container');
            if (container.querySelector(`[data-tag-id="${tagInfo.tagId}"]`)) return;
            container.appendChild(createTagPill({
                id: tagInfo.tagId,
                name: tagInfo.tagName,
                color: tagInfo.tagColor
            }, currentPhoto.id));

            // 若是地标 tag 且成功为无位置照片补充了坐标，则刷新位置显示
            if (tagInfo.locationApplied) {
                const { lat, lng } = tagInfo.locationApplied;
                currentPhoto.lat = lat;
                currentPhoto.lng = lng;
                document.getElementById('info-coordinates').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                document.getElementById('info-location').textContent = i18n.t('photo.loading');
                document.getElementById('miniMapContainer').style.display = 'block';
                initMiniMap(lat, lng);
                try {
                    const cityName = await ipcRenderer.invoke('get-city-name', { lat, lng });
                    document.getElementById('info-location').textContent = cityName;
                } catch (_) {
                    document.getElementById('info-location').textContent = i18n.t('photo.failedLoad');
                }
            }
        });

        // ── Match Tags ───────────────────────────────────
        let faceApiLoaded = false;

        async function ensureFaceApiLoaded() {
            if (faceApiLoaded) return true;
            if (typeof faceapi === 'undefined') return false;
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1/model';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
                ]);
                faceApiLoaded = true;
                return true;
            } catch (err) {
                console.error('face-api model load error:', err);
                return false;
            }
        }

        function euclideanDistance(a, b) {
            let sum = 0;
            for (let i = 0; i < a.length; i++) {
                const d = a[i] - b[i];
                sum += d * d;
            }
            return Math.sqrt(sum);
        }

        // ── Similar Tab ──────────────────────────────────────────

        // State
        let simPhotos = [];            // currently displayed candidate photos
        let simFocusedIndex = -1;      // which thumb is shown in preview
        let simStripOffset = 0;        // current scroll offset (px)
        let simThumbWidth = 96;        // thumb width + gap
        let simPreviewScale = 1;
        let simPreviewTX = 0;
        let simPreviewTY = 0;
        let simPreviewDragging = false;
        let simPreviewDragStartX = 0;
        let simPreviewDragStartY = 0;
        let simCurrentPhotoHash = null; // perceptual hash of current photo

        // ── Perceptual hash (8×8 average hash) ──────────────────
        function computeHash(imgEl) {
            const SIZE = 8;
            const canvas = document.createElement('canvas');
            canvas.width = SIZE; canvas.height = SIZE;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imgEl, 0, 0, SIZE, SIZE);
            const data = ctx.getImageData(0, 0, SIZE, SIZE).data;
            const gray = [];
            for (let i = 0; i < SIZE * SIZE; i++) {
                gray.push((data[i*4]*77 + data[i*4+1]*150 + data[i*4+2]*29) >> 8);
            }
            const avg = gray.reduce((a,b) => a+b, 0) / gray.length;
            return gray.map(v => v >= avg ? 1 : 0);
        }

        function hashSimilarity(h1, h2) {
            if (!h1 || !h2 || h1.length !== h2.length) return 0;
            let same = 0;
            for (let i = 0; i < h1.length; i++) if (h1[i] === h2[i]) same++;
            return same / h1.length;
        }

        async function getHashFromUrl(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(computeHash(img));
                img.onerror = () => resolve(null);
                img.src = url;
            });
        }

        // Compute hash of the main photo currently displayed
        async function computeCurrentPhotoHash() {
            if (!currentPhoto || currentPhoto.type === 'video') { simCurrentPhotoHash = null; return; }
            try {
                const img = document.getElementById('photoImage');
                if (img.complete && img.naturalWidth > 0) {
                    simCurrentPhotoHash = computeHash(img);
                } else {
                    simCurrentPhotoHash = null;
                }
            } catch (e) {
                simCurrentPhotoHash = null;
            }
        }

        // ── Load and display similar photos ──────────────────────
        async function loadSimilarPhotos() {
            if (!currentPhoto || !currentPhoto.id) return;

            const minutes   = parseInt(document.getElementById('simMinutes').value) || 5;
            const threshold = parseInt(document.getElementById('simThreshold').value) || 50;

            const btn = document.getElementById('simRefreshBtn');
            btn.disabled = true;
            btn.textContent = '加载中...';

            const strip = document.getElementById('simStrip');
            strip.innerHTML = '<div class="sim-strip-empty">加载中...</div>';
            simPhotos = [];
            simFocusedIndex = -1;
            simStripOffset = 0;
            updateSimRemoveBtn();
            clearSimPreview();

            try {
                const res = await ipcRenderer.invoke('get-similar-photos', {
                    photoId: currentPhoto.id,
                    minuteRange: minutes
                });
                if (!res.success || res.photos.length === 0) {
                    strip.innerHTML = '<div class="sim-strip-empty">未找到符合条件的相似照片</div>';
                    return;
                }

                await computeCurrentPhotoHash();

                // Filter by visual similarity
                const filtered = [];
                for (const photo of res.photos) {
                    if (!photo.fullPath) continue;
                    const url = pathToFileURL(photo.fullPath).href;
                    const hash = await getHashFromUrl(url);
                    const sim = hashSimilarity(simCurrentPhotoHash, hash);
                    if (sim * 100 >= threshold) {
                        filtered.push({ ...photo, _hash: hash, _sim: sim });
                    }
                }

                if (filtered.length === 0) {
                    strip.innerHTML = '<div class="sim-strip-empty">未找到视觉相似度满足要求的照片</div>';
                    return;
                }

                simPhotos = filtered;
                renderSimStrip();
            } catch (e) {
                console.error('load similar photos error:', e);
                strip.innerHTML = '<div class="sim-strip-empty">加载失败</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = '刷新';
            }
        }

        // ── Render thumbnail strip ────────────────────────────────
        function renderSimStrip() {
            const strip = document.getElementById('simStrip');
            strip.innerHTML = '';
            simStripOffset = 0;
            strip.style.transform = 'translateX(0)';

            simPhotos.forEach((photo, idx) => {
                const item = document.createElement('div');
                item.className = 'sim-thumb';
                item.dataset.idx = idx;

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'sim-thumb-check';
                cb.checked = false;
                cb.addEventListener('change', () => {
                    item.classList.toggle('checked', cb.checked);
                    updateSimRemoveBtn();
                });
                cb.addEventListener('click', e => e.stopPropagation());
                item.appendChild(cb);

                const img = document.createElement('img');
                img.src = pathToFileURL(photo.fullPath).href;
                img.onerror = () => { img.style.display='none'; };
                item.appendChild(img);

                const overlay = document.createElement('div');
                overlay.className = 'sim-thumb-overlay';

                const timeEl = document.createElement('div');
                timeEl.className = 'sim-thumb-time';
                if (photo.time) {
                    const d = new Date(photo.time);
                    if (!isNaN(d)) {
                        const p = n => String(n).padStart(2,'0');
                        timeEl.textContent = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
                    }
                }
                overlay.appendChild(timeEl);

                const remEl = document.createElement('div');
                remEl.className = 'sim-thumb-remark';
                remEl.textContent = photo.remark || '';
                overlay.appendChild(remEl);

                item.appendChild(overlay);

                item.addEventListener('click', () => focusSimThumb(idx));
                strip.appendChild(item);
            });

            simThumbWidth = 90 + 6; // thumb width + gap
            updateSimNavBtns();
            if (simPhotos.length > 0) focusSimThumb(0);
        }

        function focusSimThumb(idx) {
            simFocusedIndex = idx;
            document.querySelectorAll('.sim-thumb').forEach((el, i) => {
                el.classList.toggle('focused', i === idx);
            });
            showSimPreview(simPhotos[idx]);
            scrollStripToShowThumb(idx);
        }

        function scrollStripToShowThumb(idx) {
            const viewport = document.querySelector('.sim-strip-viewport');
            if (!viewport) return;
            const viewW = viewport.clientWidth;
            const thumbStart = idx * simThumbWidth;
            const thumbEnd   = thumbStart + 90;
            const visStart   = -simStripOffset;
            const visEnd     = visStart + viewW;
            if (thumbStart < visStart) {
                simStripOffset = -thumbStart;
            } else if (thumbEnd > visEnd) {
                simStripOffset = -(thumbEnd - viewW);
            }
            applySimStripOffset();
        }

        function applySimStripOffset() {
            const strip = document.getElementById('simStrip');
            const viewport = document.querySelector('.sim-strip-viewport');
            if (!strip || !viewport) return;
            const maxOffset = 0;
            const totalW = simPhotos.length * simThumbWidth - 6; // minus last gap
            const minOffset = Math.min(0, viewport.clientWidth - totalW - 8);
            simStripOffset = Math.max(minOffset, Math.min(maxOffset, simStripOffset));
            strip.style.transform = `translateX(${simStripOffset}px)`;
            updateSimNavBtns();
        }

        function updateSimNavBtns() {
            const viewport = document.querySelector('.sim-strip-viewport');
            const totalW = simPhotos.length * simThumbWidth - 6;
            const viewW  = viewport ? viewport.clientWidth : 0;
            document.getElementById('simNavLeft').disabled  = simStripOffset >= 0;
            document.getElementById('simNavRight').disabled = totalW <= viewW || simStripOffset <= viewW - totalW - 8;
        }

        function scrollSimStrip(dir) {
            // dir: -1 = left, 1 = right
            simStripOffset -= dir * (simThumbWidth * 2);
            applySimStripOffset();
        }

        document.getElementById('simNavLeft').addEventListener('click', () => scrollSimStrip(-1));
        document.getElementById('simNavRight').addEventListener('click', () => scrollSimStrip(1));

        // ── Preview area ─────────────────────────────────────────
        function showSimPreview(photo) {
            const img = document.getElementById('simPreviewImg');
            const empty = document.getElementById('simPreviewEmpty');
            if (!photo || !photo.fullPath) { clearSimPreview(); return; }
            img.style.display = 'block';
            empty.style.display = 'none';
            img.src = pathToFileURL(photo.fullPath).href;
            simPreviewScale = 1;
            simPreviewTX = 0;
            simPreviewTY = 0;
            applySimPreviewTransform();
        }

        function clearSimPreview() {
            const img = document.getElementById('simPreviewImg');
            const empty = document.getElementById('simPreviewEmpty');
            img.src = '';
            img.style.display = 'none';
            empty.style.display = 'flex';
        }

        function applySimPreviewTransform() {
            const img = document.getElementById('simPreviewImg');
            img.style.transform = `scale(${simPreviewScale}) translate(${simPreviewTX / simPreviewScale}px, ${simPreviewTY / simPreviewScale}px)`;
        }

        const simPreviewWrap = document.getElementById('simPreviewWrap');

        simPreviewWrap.addEventListener('wheel', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const delta = e.deltaY > 0 ? -0.15 : 0.15;
            simPreviewScale = Math.max(0.5, Math.min(8, simPreviewScale + delta));
            applySimPreviewTransform();
        }, { passive: false, capture: true });

        simPreviewWrap.addEventListener('mousedown', (e) => {
            simPreviewDragging = true;
            simPreviewDragStartX = e.clientX - simPreviewTX;
            simPreviewDragStartY = e.clientY - simPreviewTY;
            simPreviewWrap.classList.add('dragging');
        });
        document.addEventListener('mousemove', (e) => {
            if (!simPreviewDragging) return;
            simPreviewTX = e.clientX - simPreviewDragStartX;
            simPreviewTY = e.clientY - simPreviewDragStartY;
            applySimPreviewTransform();
        });
        document.addEventListener('mouseup', () => {
            if (!simPreviewDragging) return;
            simPreviewDragging = false;
            simPreviewWrap.classList.remove('dragging');
        });

        // ── Remove button ─────────────────────────────────────────
        function updateSimRemoveBtn() {
            const checkedCount = document.querySelectorAll('.sim-thumb-check:checked').length;
            const btn = document.getElementById('simRemoveBtn');
            btn.disabled = checkedCount === 0;
            btn.textContent = checkedCount > 0 ? `移除 (${checkedCount})` : '移除';
        }

        document.getElementById('simRemoveBtn').addEventListener('click', async () => {
            const checked = [...document.querySelectorAll('.sim-thumb')].filter(el =>
                el.querySelector('.sim-thumb-check').checked
            );
            if (checked.length === 0) return;

            const photoIds = checked.map(el => simPhotos[parseInt(el.dataset.idx)].id);

            try {
                const res = await ipcRenderer.invoke('remove-similar-photos', { photoIds });
                if (!res || res.cancelled) return;
                if (!res.success) { alert('移除失败：' + res.error); return; }

                // Remove from strip
                const removedSet = new Set(res.removedIds);
                simPhotos = simPhotos.filter(p => !removedSet.has(p.id));

                // Re-render strip
                if (simPhotos.length === 0) {
                    document.getElementById('simStrip').innerHTML = '<div class="sim-strip-empty">已全部移除</div>';
                    clearSimPreview();
                    simFocusedIndex = -1;
                } else {
                    renderSimStrip();
                    const newIdx = Math.min(simFocusedIndex, simPhotos.length - 1);
                    focusSimThumb(Math.max(0, newIdx));
                }
                updateSimRemoveBtn();
            } catch (e) {
                console.error('remove-similar-photos error:', e);
                alert('移除失败：' + e.message);
            }
        });

        // ── Load/save sim settings ────────────────────────────────
        (async () => {
            try {
                const s = await ipcRenderer.invoke('get-sim-settings');
                document.getElementById('simMinutes').value   = s.minutes;
                document.getElementById('simThreshold').value = s.threshold;
            } catch (_) {}
        })();

        function saveSimSettings() {
            const minutes   = parseInt(document.getElementById('simMinutes').value)   || 5;
            const threshold = parseInt(document.getElementById('simThreshold').value) || 50;
            ipcRenderer.invoke('save-sim-settings', { minutes, threshold }).catch(() => {});
        }

        document.getElementById('simMinutes').addEventListener('change', saveSimSettings);
        document.getElementById('simThreshold').addEventListener('change', saveSimSettings);

        // ── Refresh button ────────────────────────────────────────
        document.getElementById('simRefreshBtn').addEventListener('click', loadSimilarPhotos);

        // ── Tab switch: load on first activation ─────────────────
        // (hooked into the existing tab-switching logic below)
        let simTabLoaded = false;

        // ── Keyboard left/right in similar tab ───────────────────
        // Overrides the default photo-navigation arrow keys when similar tab is active

        document.querySelector('.match-tag-btn').addEventListener('click', async () => {
            if (!currentPhoto || !currentPhoto.id) return;

            const btn = document.querySelector('.match-tag-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = i18n.t('photo.matching');

            try {
                let matchedFaceTagIds = [];

                // Rule 1: Face matching (in renderer process)
                if (currentPhoto.type !== 'video') {
                    const loaded = await ensureFaceApiLoaded();
                    if (loaded) {
                        try {
                            const img = document.getElementById('photoImage');
                            // Create a canvas for detection (resize large images)
                            const maxDim = 800;
                            let canvas = document.createElement('canvas');
                            const scale = Math.min(1, maxDim / Math.max(img.naturalWidth, img.naturalHeight));
                            canvas.width = img.naturalWidth * scale;
                            canvas.height = img.naturalHeight * scale;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                            const detections = await faceapi
                                .detectAllFaces(canvas)
                                .withFaceLandmarks()
                                .withFaceDescriptors();

                            if (detections.length > 0) {
                                // Get all face tags with descriptors
                                const faceRes = await ipcRenderer.invoke('get-all-face-descriptors');
                                if (faceRes.success && faceRes.faceTags.length > 0) {
                                    const THRESHOLD = 0.6;
                                    const matchedIds = new Set();

                                    for (const det of detections) {
                                        const photoDesc = Array.from(det.descriptor);
                                        let bestMatch = null;
                                        let bestDist = Infinity;

                                        for (const faceTag of faceRes.faceTags) {
                                            for (const sample of faceTag.descriptors) {
                                                const dist = euclideanDistance(photoDesc, sample.descriptor);
                                                if (dist < bestDist) {
                                                    bestDist = dist;
                                                    bestMatch = faceTag;
                                                }
                                            }
                                        }

                                        if (bestMatch && bestDist < THRESHOLD) {
                                            matchedIds.add(bestMatch.id);
                                        }
                                    }

                                    matchedFaceTagIds = Array.from(matchedIds);
                                }
                            }
                        } catch (faceErr) {
                            console.error('Face matching error:', faceErr);
                        }
                    }
                }

                // Rules 2 & 3: Event + Location matching (in main process)
                const res = await ipcRenderer.invoke('match-tags-for-photo', {
                    photoId: currentPhoto.id,
                    matchedFaceTagIds
                });

                if (res.success && res.matchedTags.length > 0) {
                    const container = document.getElementById('tags-container');
                    for (const tag of res.matchedTags) {
                        if (!container.querySelector(`[data-tag-id="${tag.id}"]`)) {
                            container.appendChild(createTagPill(tag, currentPhoto.id));
                        }
                    }
                    btn.textContent = i18n.t('photo.matchResult', { count: res.matchedTags.length });
                } else {
                    btn.textContent = i18n.t('photo.matchNone');
                }

                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 2000);

            } catch (err) {
                console.error('Match tags error:', err);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
