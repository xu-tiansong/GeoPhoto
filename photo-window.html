<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Photo Viewer</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="node_modules/leaflet/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* ── Title Bar ─────────────────────────────────── */
        .title-bar {
            -webkit-app-region: drag;
            height: 40px;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            border-bottom: 1px solid #2e2e2e;
            flex-shrink: 0;
        }
        .title-bar-text { font-size: 14px; font-weight: 500; color: #ddd; }
        .title-bar-close {
            -webkit-app-region: no-drag;
            width: 30px; height: 30px;
            background: #c62828;
            border: none; border-radius: 4px;
            cursor: pointer; color: #fff; font-size: 18px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .title-bar-close:hover { background: #b71c1c; }

        /* ── Main Layout ───────────────────────────────── */
        .main { flex: 1; display: flex; overflow: hidden; }

        /* 左侧照片容器 */
        .photo-container {
            flex: 1;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        .photo-container.dragging {
            cursor: grabbing;
        }

        .photo-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-wrapper img,
        .photo-wrapper video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            transition: transform 0.1s ease-out;
        }

        .photo-wrapper video {
            display: none;
            width: 100%;
            height: 100%;
        }

        .photo-wrapper video.active {
            display: block;
        }

        .photo-wrapper img.active {
            display: block;
        }

        .photo-wrapper img:not(.active) {
            display: none;
        }

        /* 翻页导航箭头 */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 96px;
            background: rgba(0, 0, 0, 0.28);
            color: rgba(255, 255, 255, 0.75);
            font-size: 36px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 6px;
            z-index: 20;
            transition: background 0.18s, color 0.18s;
            user-select: none;
            -webkit-app-region: no-drag;
        }

        .nav-arrow:hover {
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
        }

        .nav-arrow.visible {
            display: flex;
        }

        .nav-prev { left: 12px; }
        .nav-next { right: 12px; }

        /* 缩放控制按钮 */
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 6px;
            z-index: 10;
        }

        .zoom-btn {
            background: #2a2a2a;
            border: 1px solid #383838;
            color: #e0e0e0;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .zoom-btn:hover {
            background: #333;
        }

        .zoom-level {
            color: #aaa;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 14px;
        }

        /* 右侧容器 */
        .sidebar {
            width: 320px;
            background: #2a2a2a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            min-width: 240px;
        }

        .sidebar.editing {
            width: 50% !important;
        }

        /* 左右分隔拖拽条 */
        .split-divider {
            width: 5px;
            flex-shrink: 0;
            background: #222;
            cursor: col-resize;
            position: relative;
            transition: background 0.15s;
            z-index: 5;
        }
        .split-divider:hover,
        .split-divider.dragging {
            background: #4a9eff;
        }
        /* 扩大命中区域 */
        .split-divider::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            left: -4px; right: -4px;
        }

        /* Tab导航 */
        .tab-nav {
            display: flex;
            background: #1a1a1a;
            padding: 10px 10px 0 10px;
            gap: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.18s;
            font-size: 12px;
            font-family: inherit;
        }

        .tab-btn:hover {
            color: #bbb;
            background: rgba(255,255,255,0.04);
        }

        .tab-btn.active {
            color: #e0e0e0;
            border-bottom-color: #4a9eff;
        }

        /* Tab内容 */
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            min-height: 0;
        }
        /* Similar tab: no padding, no scroll — manages its own layout */
        .tab-content:has(#tab-similar.active) {
            padding: 0;
            overflow: hidden;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* Similar tab overrides block→flex when active */
        #tab-similar.active {
            display: flex;
        }

        /* Info面板样式 */
        .info-row {
            margin-bottom: 16px;
        }

        .info-label {
            color: #777;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .info-value {
            color: #e0e0e0;
            font-size: 14px;
            word-break: break-all;
        }

        /* ── 坐标行 ────────────────────────────────────── */
        .coord-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #info-coordinates {
            flex: 1;
            min-width: 0;
        }
        .coord-action-btn {
            flex-shrink: 0;
            background: none;
            border: 1px solid #444;
            border-radius: 4px;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
            padding: 1px 5px;
            line-height: 1.4;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .coord-action-btn:hover { background: #333; color: #e0e0e0; border-color: #666; }
        .coord-action-btn:disabled { opacity: 0.3; cursor: default; }
        .coord-action-btn:disabled:hover { background: none; color: #aaa; border-color: #444; }

        /* ── 目录复制 ──────────────────────────────────── */
        #info-directory {
            cursor: pointer;
        }
        #info-directory:hover {
            text-decoration: underline dotted #888;
        }

        /* Remark输入框样式 */
        .remark-container {
            margin-top: 16px;
        }

        .remark-textarea {
            width: 100%;
            min-height: 80px;
            background: #222;
            border: 1px solid #383838;
            border-radius: 4px;
            color: #ddd;
            padding: 8px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
        }

        .remark-textarea:focus {
            border-color: #4a9eff;
        }

        .remark-save-btn {
            margin-top: 8px;
            padding: 6px 16px;
            background: #4a9eff;
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: background 0.15s;
            display: none;
        }

        .remark-save-btn.visible {
            display: inline-block;
        }

        .remark-save-btn:hover {
            background: #3a8eef;
        }

        /* Like按钮 */
        .like-container {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2e2e2e;
        }

        .like-btn {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #383838;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #777;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.15s;
        }

        .like-btn:hover {
            background: #333;
            color: #ff6b6b;
        }

        .like-btn.liked {
            background: #ff6b6b;
            color: #fff;
        }

        .like-btn.liked:hover {
            background: #ff5252;
        }

        .like-btn .heart-icon {
            font-size: 18px;
        }

        .delete-btn {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #383838;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #888;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.15s;
        }

        .delete-btn:hover {
            background: #3a1a1a;
            border-color: #c62828;
            color: #e57373;
        }

        /* ── Similar tab ────────────────────────────────── */
        #tab-similar {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 0;
            overflow: hidden;
        }
        #tab-similar.active {
            display: flex;
        }

        .sim-controls {
            padding: 12px 14px 8px 14px;
            flex-shrink: 0;
        }
        .sim-control-row {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .sim-control-label {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
        }
        .sim-number-input {
            width: 52px;
            background: #222;
            border: 1px solid #444;
            border-radius: 3px;
            color: #e0e0e0;
            padding: 3px 6px;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            text-align: center;
        }
        .sim-number-input:focus { border-color: #4a9eff; }
        .sim-refresh-btn {
            margin-left: 4px;
            padding: 4px 12px;
            background: #333;
            border: 1px solid #555;
            border-radius: 3px;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .sim-refresh-btn:hover { background: #444; }
        .sim-refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .sim-hint {
            padding: 0 14px 8px 14px;
            font-size: 11px;
            color: #666;
            line-height: 1.5;
            flex-shrink: 0;
        }

        /* thumbnail strip */
        .sim-strip-wrap {
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding: 0 4px;
            background: #1e1e1e;
            border-top: 1px solid #2a2a2a;
            border-bottom: 1px solid #2a2a2a;
        }
        .sim-strip-viewport {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .sim-strip {
            display: flex;
            gap: 6px;
            padding: 8px 4px;
            transition: transform 0.2s ease;
            will-change: transform;
        }
        .sim-strip-empty {
            padding: 14px 10px;
            font-size: 12px;
            color: #555;
            white-space: nowrap;
        }
        .sim-nav-btn {
            flex-shrink: 0;
            width: 22px;
            height: 90px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.35);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.15s;
            border-radius: 3px;
            z-index: 1;
        }
        .sim-nav-btn:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }
        .sim-nav-btn:disabled { opacity: 0; cursor: default; }

        /* individual thumbnail */
        .sim-thumb {
            flex-shrink: 0;
            width: 90px;
            height: 90px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 2px solid #383838;
            cursor: pointer;
            transition: border-color 0.15s;
            background: #111;
        }
        .sim-thumb:hover { border-color: #4a9eff; }
        .sim-thumb.focused { border-color: #4a9eff; }
        .sim-thumb.checked { border-color: #ff6b6b; }

        .sim-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .sim-thumb-check {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 16px;
            height: 16px;
            cursor: pointer;
            z-index: 3;
            accent-color: #ff6b6b;
        }
        .sim-thumb-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: rgba(0,0,0,0.55);
            padding: 3px 4px 3px 4px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 1px;
            pointer-events: none;
        }
        .sim-thumb-time {
            font-size: 9px;
            color: rgba(255,255,255,0.8);
            line-height: 1.3;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .sim-thumb-remark {
            font-size: 9px;
            color: rgba(255,255,255,0.55);
            line-height: 1.3;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        /* preview area */
        .sim-preview-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
            background: #0a0a0a;
            overflow: hidden;
            cursor: grab;
        }
        .sim-preview-wrap.dragging { cursor: grabbing; }
        .sim-preview-wrap .sim-preview-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sim-preview-wrap img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }
        .sim-preview-empty {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #444;
        }

        /* footer remove button */
        .sim-footer {
            flex-shrink: 0;
            padding: 8px 14px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            justify-content: center;
        }
        .sim-remove-btn {
            padding: 7px 36px;
            background: #c62828;
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: background 0.15s;
        }
        .sim-remove-btn:hover:not(:disabled) { background: #b71c1c; }
        .sim-remove-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* Tags面板 */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2a2a2a;
            border: 1px solid #383838;
            padding: 4px 8px 4px 10px;
            border-radius: 16px;
            font-size: 12px;
            color: #e0e0e0;
        }
        .tag-pill .tag-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .tag-pill .tag-remove {
            width: 16px; height: 16px;
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .tag-pill .tag-remove:hover {
            color: #ff5252;
            background: rgba(255,82,82,0.15);
        }

        .tag-btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .add-tag-btn, .match-tag-btn {
            background: #4a9eff;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: background 0.15s;
        }
        .match-tag-btn {
            background: #4caf50;
        }
        .match-tag-btn:hover { background: #43a047; }
        .match-tag-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .add-tag-btn:hover {
            background: #3a8eef;
        }

        /* 小地图样式 */
        .mini-map-container {
            margin-top: 16px;
            border-radius: 4px;
            overflow: hidden;
            background: #1a1a1a;
        }

        .mini-map-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .mini-map-label {
            color: #777;
            font-size: 11px;
        }

        .edit-location-btn {
            font-size: 11px;
            padding: 2px 8px;
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            cursor: pointer;
            border-radius: 3px;
            font-family: inherit;
        }
        .edit-location-btn:hover { background: #444; }
        .edit-location-btn.cancel { border-color: #e57373; color: #e57373; }
        .edit-location-btn.cancel:hover { background: rgba(229,115,115,0.1); }

        .edit-location-hint {
            font-size: 11px;
            color: #4a9eff;
            margin-bottom: 6px;
            text-align: center;
            padding: 4px 8px;
            background: rgba(74,158,255,0.1);
            border-radius: 3px;
        }

        #miniMap {
            width: 100%;
            height: 180px;
            border-radius: 4px;
            transition: height 0.3s ease;
        }

        .sidebar.editing #miniMap {
            height: 360px;
        }

        /* 地址搜索框 */
        .location-search {
            position: relative;
            margin-bottom: 6px;
        }

        .location-search-row {
            display: flex;
            gap: 4px;
        }

        .location-search-input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: #e0e0e0;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            min-width: 0;
        }
        .location-search-input:focus { border-color: #4a9eff; }

        .location-search-btn {
            padding: 4px 10px;
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            cursor: pointer;
            border-radius: 3px;
            font-size: 12px;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .location-search-btn:hover { background: #444; }

        .location-search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #2a2a2a;
            border: 1px solid #444;
            border-top: none;
            border-radius: 0 0 4px 4px;
            z-index: 9999;
            max-height: 180px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 6px 8px;
            font-size: 11px;
            color: #ccc;
            cursor: pointer;
            border-bottom: 1px solid #333;
            line-height: 1.4;
        }
        .search-result-item:hover { background: #3a3a3a; color: #fff; }
        .search-result-item:last-child { border-bottom: none; }
        .search-status-item { padding: 6px 8px; font-size: 11px; color: #666; }

        /* 相邻照片参考条 */
        .nearby-photos-strip {
            margin-top: 6px;
            padding-top: 4px;
        }
        .nearby-strip-label {
            color: #555;
            font-size: 10px;
            margin-bottom: 4px;
        }
        .nearby-photos-row {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 2px;
            align-items: stretch;
        }
        .nearby-photos-row::-webkit-scrollbar { height: 3px; }
        .nearby-photos-row::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .nearby-photo-item {
            flex-shrink: 0;
            width: 84px;
            cursor: pointer;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            border: 1.5px solid #383838;
            transition: border-color 0.15s;
        }
        .nearby-photo-item:hover { border-color: #4a9eff; }
        .nearby-photo-item.no-location { opacity: 0.4; cursor: default; }
        .nearby-photo-item.no-location:hover { border-color: #383838; }
        .nearby-photo-thumb {
            width: 84px;
            height: 84px;
            object-fit: cover;
            display: block;
            background: #111;
        }
        .nearby-photo-video {
            width: 84px;
            height: 84px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .nearby-photo-loc {
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 11px;
            line-height: 1;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.9));
        }
        .nearby-strip-sep {
            width: 1px;
            flex-shrink: 0;
            background: #333;
            border-radius: 1px;
            align-self: stretch;
            margin: 0 2px;
        }

        /* 地图/地标内部 Tab */
        .loc-tab-nav {
            display: flex;
            margin-bottom: 6px;
            background: #1e1e1e;
            border-radius: 3px;
            overflow: hidden;
        }
        .loc-tab-btn {

        /* 地标树 */
        .landmark-tree-container {
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 6px;
            background: #1a1a1a;
            border-radius: 3px;

        .landmark-tree-container::-webkit-scrollbar { width: 4px; }

        /* 占位符文本 */

        /* 滚动条样式 */

        <!-- Tab内容 -->

                    <!-- 编辑模式内部 Tab 导航 -->
                    <div class="loc-tab-nav" id="locTabNav" style="display:none;">
                        <button class="loc-tab-btn active" data-loctab="map">地图</button>
                        <button class="loc-tab-btn" data-loctab="landmark">地标</button>
                    </div>
                    <!-- 地图 Tab 面板 -->
                    <div id="mapTabPanel">
                        <div class="location-search" id="locationSearch" style="display:none;">
                            <div class="location-search-row">
                                <input type="text" class="location-search-input" id="locationSearchInput"
                                       data-i18n-placeholder="photo.searchAddress" placeholder="Search address...">
                                <button class="location-search-btn" id="locationSearchBtn" data-i18n="photo.search">Search</button>

                            <div class="location-search-results" id="locationSearchResults" style="display:none;"></div>

                        <div id="miniMap"></div>
                        <div class="nearby-photos-strip" id="nearbyPhotosStrip" style="display:none;">

            <!-- Similar面板 -->
            <div class="tab-pane" id="tab-similar">
                <!-- 参数控制行 -->

                        <span class="sim-control-label">分钟</span>

                        <input type="number" id="simThreshold" class="sim-number-input" value="50" min="1" max="100">
                        <span class="sim-control-label">%</span>

                    </div>

                <div class="sim-hint">以下是拍摄当前照片的同时在同一地点拍摄的其他类似照片，勾选你不想保留的照片，按"移除"按钮之后，这些照片将被移入回收站。</div>

                            <div class="sim-strip-empty">点击"刷新"加载相似照片</div>

                    <!-- Tags will be added here -->

                    <button class="add-tag-btn" data-i18n="photo.addTag">Add Tag</button>
                    <button class="match-tag-btn" data-i18n="photo.matchTag">Match Tags</button>
                </div>

        </div>
    </div>
    </div><!-- /.main -->

    <script>
        const { ipcRenderer } = require('electron');
        const L = require('leaflet');
        const { pathToFileURL } = require('url');
        const fs = require('fs');
        const i18n = require('./modules/i18n');

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }

        // EXIF orientation → rotation degrees (for embedded previews without own EXIF rotation)
        // Handles the common rotation-only cases; flip-only cases (2,4) treated as 0°
        const EXIF_ORIENT_DEG = { 3: 180, 5: 90, 6: 90, 7: 270, 8: 270 };

        // Rotate a JPEG blob by degrees using an off-screen canvas
        function rotateBlobByDegrees(blob, degrees) {
            if (!degrees || degrees % 360 === 0) return Promise.resolve(blob);
            return new Promise((resolve) => {
                const img = new Image();
                const url = URL.createObjectURL(blob);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    const swap = degrees === 90 || degrees === 270;
                    const canvas = document.createElement('canvas');
                    canvas.width  = swap ? img.naturalHeight : img.naturalWidth;
                    canvas.height = swap ? img.naturalWidth  : img.naturalHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate(degrees * Math.PI / 180);
                    ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
                    canvas.toBlob(newBlob => resolve(newBlob || blob), 'image/jpeg', 0.92);
                };
                img.onerror = () => { URL.revokeObjectURL(url); resolve(blob); };
                img.src = url;
            });
        }

        // i18n 初始化
        (async () => {
            const lang = await ipcRenderer.invoke('get-language');
            i18n.applyToDOM(document, lang);
        })();
        ipcRenderer.on('language-changed', (_event, lang) => {
            i18n.applyToDOM(document, lang);
        });

        let currentPhoto = null;
        let navTotal = 0;
        let navCurrentIndex = -1;
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let miniMap = null;
        let miniMapMarker = null;
        let isEditingLocation = false;
        let originalRemark = '';

        const photoContainer = document.getElementById('photoContainer');
        const photoWrapper = document.getElementById('photoWrapper');
        const photoImage = document.getElementById('photoImage');
        const videoPlayer = document.getElementById('videoPlayer');
        const zoomLevel = document.getElementById('zoomLevel');

        // 加载照片数据
        ipcRenderer.on('load-photo', (event, photoData) => {
            currentPhoto = photoData;
            loadPhoto(photoData);
            // 重置Similar tab状态，下次切换时重新加载
            simTabLoaded = false;
            simPhotos = [];
            simFocusedIndex = -1;
            simCurrentPhotoHash = null;
            if (document.getElementById('tab-similar').classList.contains('active')) {
                document.getElementById('simStrip').innerHTML = '<div class="sim-strip-empty">点击"刷新"加载相似照片</div>';
                clearSimPreview();
                updateSimRemoveBtn();
            }
        });

        // 右键菜单（在照片画面上）
        photoContainer.addEventListener('contextmenu', () => {
            if (!currentPhoto) return;
            ipcRenderer.send('show-photo-context-menu', {
                photoId:   currentPhoto.id,
                directory: currentPhoto.directory,
                filename:  currentPhoto.filename,
                isVideo:   currentPhoto.type === 'video'
            });
        });

        // 当前显示的照片被删除时：尝试翻页，否则关闭窗口
        ipcRenderer.on('photo-deleted', async (_event, { photoId }) => {
            if (!currentPhoto || currentPhoto.id !== photoId) return;
            if (navTotal > 1) {
                const next = await ipcRenderer.invoke('navigate-photo', 'next');
                if (!next || !next.success) {
                    const prev = await ipcRenderer.invoke('navigate-photo', 'prev');
                    if (!prev || !prev.success) window.close();
                }
            } else {
                window.close();
            }
        });

        // 翻页导航信息
        ipcRenderer.on('set-navigation', (event, { currentIndex, total }) => {
            navCurrentIndex = currentIndex;
            navTotal = total;
            const prevArrow = document.getElementById('navPrev');
            const nextArrow = document.getElementById('navNext');
            prevArrow.classList.toggle('visible', currentIndex > 0);
            nextArrow.classList.toggle('visible', currentIndex < total - 1);
        });

        // 翻页箭头点击
        document.getElementById('navPrev').addEventListener('click', async (e) => {
            e.stopPropagation();
            await ipcRenderer.invoke('navigate-photo', 'prev');
        });

        document.getElementById('navNext').addEventListener('click', async (e) => {
            e.stopPropagation();
            await ipcRenderer.invoke('navigate-photo', 'next');
        });

        // 键盘左右键翻页（Similar tab激活时改为滚动缩略图条）
        document.addEventListener('keydown', async (e) => {
            const similarActive = document.getElementById('tab-similar').classList.contains('active');
            if (e.key === 'ArrowLeft') {
                if (similarActive) { scrollSimStrip(-1); }
                else { await ipcRenderer.invoke('navigate-photo', 'prev'); }
            } else if (e.key === 'ArrowRight') {
                if (similarActive) { scrollSimStrip(1); }
                else { await ipcRenderer.invoke('navigate-photo', 'next'); }
            }
        });

        // 加载照片
        async function loadPhoto(photo) {
            // 使用fullPath如果存在，否则拼接路径
            const filePath = photo.fullPath || 
                (photo.directory.includes(photo.filename) 
                    ? photo.directory 
                    : `${photo.directory}\\${photo.filename}`);
            
            // 转换为标准 file URL
            const fileUrl = pathToFileURL(filePath).href;
            
            console.log('Loading media:', {
                type: photo.type,
                filename: photo.filename,
                directory: photo.directory,
                filePath: filePath,
                fileUrl: fileUrl
            });
            
            // 根据类型显示图片或视频
            if (photo.type === 'video') {
                photoImage.classList.remove('active');
                videoPlayer.classList.add('active');
                
                // 直接设置视频src
                videoPlayer.src = fileUrl;
                
                // 添加错误处理
                videoPlayer.onerror = (e) => {
                    console.error('Video error:', e);
                    console.error('Video error details:', {
                        error: videoPlayer.error,
                        networkState: videoPlayer.networkState,
                        readyState: videoPlayer.readyState,
                        src: videoPlayer.src
                    });
                };
                
                // 等待视频元数据加载后再重置缩放
                videoPlayer.onloadedmetadata = () => {
                    console.log('Video metadata loaded:', {
                        width: videoPlayer.videoWidth,
                        height: videoPlayer.videoHeight,
                        duration: videoPlayer.duration
                    });
                    resetZoom();
                };
                
                // 视频全屏事件处理
                videoPlayer.addEventListener('enterpictureinpicture', () => {
                    console.log('Entered picture-in-picture');
                });
                
                videoPlayer.load();
            } else {
                videoPlayer.classList.remove('active');
                photoImage.classList.add('active');

                if (/\.heic$/i.test(filePath)) {
                    // HEIC 格式：Chromium 不原生支持，通过主进程转换为 JPEG
                    photoImage.src = '';
                    const result = await ipcRenderer.invoke('convert-heic', { filePath });
                    if (result.success) {
                        let blob = new Blob([Buffer.from(result.data, 'base64')], { type: 'image/jpeg' });
                        // 内嵌预览通常不含 EXIF 旋转，需手动用 canvas 修正方向
                        if (result.isPreview) {
                            const deg = EXIF_ORIENT_DEG[result.orientation] || 0;
                            if (deg) blob = await rotateBlobByDegrees(blob, deg);
                        }
                        const objUrl = URL.createObjectURL(blob);
                        photoImage.onload = () => { URL.revokeObjectURL(objUrl); resetZoom(); };
                        photoImage.src = objUrl;
                    } else {
                        photoImage.alt = `HEIC conversion failed: ${result.error || 'unknown error'}`;
                        console.error('HEIC 转换失败:', result.error);
                    }
                } else {
                    photoImage.src = fileUrl;
                    // 等待图片加载完成后再重置缩放
                    photoImage.onload = () => { resetZoom(); };
                    // 如果图片已经缓存加载完成
                    if (photoImage.complete && photoImage.naturalWidth > 0) { resetZoom(); }
                }
            }
            
            // 更新Info信息
            document.getElementById('info-filename').textContent = (photo.filename || '-') +
                ((photo.id != null) ? ` (${photo.id})` : '');
            document.getElementById('info-directory').textContent = photo.directory || '-';
            document.getElementById('info-datetime').textContent = photo.time ? (() => {
                const d = new Date(photo.time);
                if (isNaN(d.getTime())) return photo.time;
                const p = (n, len = 2) => String(n).padStart(len, '0');
                return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ` +
                       `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}.${p(d.getMilliseconds(), 3)}`;
            })() : '-';
            try {
                const stat = fs.statSync(filePath);
                document.getElementById('info-filesize').textContent = formatFileSize(stat.size);
            } catch (_) {
                document.getElementById('info-filesize').textContent = '-';
            }
            
            // 始终显示地图容器（含编辑按钮），方便为无定位照片添加位置
            document.getElementById('miniMapContainer').style.display = 'block';

            if (photo.lat && photo.lng) {
                document.getElementById('info-coordinates').textContent = `${photo.lat.toFixed(6)}, ${photo.lng.toFixed(6)}`;
                document.getElementById('info-location').textContent = i18n.t('photo.loading');

                // 初始化小地图（有坐标）
                initMiniMap(photo.lat, photo.lng);

                // 异步获取城市名称
                try {
                    const cityName = await ipcRenderer.invoke('get-city-name', { lat: photo.lat, lng: photo.lng });
                    document.getElementById('info-location').textContent = cityName;
                } catch (error) {
                    console.error('Failed to get city name:', error);
                    document.getElementById('info-location').textContent = i18n.t('photo.failedLoad');
                }
            } else {
                document.getElementById('info-coordinates').textContent = '-';
                document.getElementById('info-location').textContent = i18n.t('photo.noLocation');
                // 初始化小地图（无坐标，显示世界视图供编辑）
                initMiniMap(null, null);
            }

            // 更新坐标按钮可用状态
            if (window._updateCoordBtns) window._updateCoordBtns();

            // 加载remark
            const remarkTextarea = document.getElementById('remark-textarea');
            remarkTextarea.value = photo.remark || '';
            originalRemark = photo.remark || '';
            document.getElementById('remark-save-btn').classList.remove('visible');

            // 加载Like状态
            const likeBtn = document.getElementById('likeBtn');
            const likeText = likeBtn.querySelector('.like-text');
            if (photo.like) {
                likeBtn.classList.add('liked');
                likeText.textContent = i18n.t('photo.liked');
            } else {
                likeBtn.classList.remove('liked');
                likeText.textContent = i18n.t('photo.like');
            }

            // 加载标签
            if (photo.id) loadPhotoTags(photo.id);

            // Bin 目录：只读模式（不可编辑备注/定位，隐藏喜欢和移到回收站按钮）
            const inBin = photo.directory === 'Bin';
            remarkTextarea.readOnly = inBin;
            remarkTextarea.style.opacity = inBin ? '0.5' : '';
            remarkTextarea.style.cursor = inBin ? 'default' : '';
            document.getElementById('editLocationBtn').style.display = inBin ? 'none' : '';
            document.getElementById('likeBtn').style.display          = inBin ? 'none' : '';
            document.getElementById('deleteBtn').style.display        = inBin ? 'none' : '';
            document.querySelector('.tag-btn-row').style.display      = inBin ? 'none' : '';
        }

        // 缩放控制
        document.getElementById('zoomIn').addEventListener('click', () => {
            scale = Math.min(scale + 0.25, 5);
            updateTransform();
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            const minScale = getMinScale();
            scale = Math.max(scale - 0.25, minScale);
            updateTransform();
        });

        document.getElementById('zoomReset').addEventListener('click', () => {
            resetZoom();
        });

        // 打开始终置顶的照片编辑工具窗
        document.getElementById('editPhotoBtn').addEventListener('click', () => {
            if (!currentPhoto) return;
            ipcRenderer.invoke('open-photo-edit-window', currentPhoto);
        });

        // ---- 编辑结果落地：canvas 渲染 → 保存非破坏性副本 → 当前视图刷新 ----

        // 7 个滤镜预设（与编辑窗 FILTER_DEFS 一致），作为 canvas filter 片段
        const EDIT_FILTER_PRESETS = {
            none:    '',
            mono:    'grayscale(1)',
            warm:    'sepia(.4) saturate(1.4) hue-rotate(-15deg)',
            cool:    'saturate(1.2) hue-rotate(180deg)',
            vintage: 'sepia(.6) contrast(.9) brightness(1.05)',
            hdr:     'contrast(1.4) saturate(1.3)',
            film:    'contrast(1.1) sepia(.25) saturate(1.1)',
        };

        // 把调节参数 + 滤镜合成为一个 canvas ctx.filter 字符串。
        // 说明：canvas 滤镜原生支持 brightness/contrast/saturate 等；
        //   - 曝光(exposure) 并入亮度；
        //   - 阴影/高光(shadow/highlight) 用亮度+对比度做温和近似（无逐区域控制）；
        //   - 锐化(sharpen) 需卷积核，canvas filter 不支持，暂忽略。
        function buildEditFilter(adjust, filterKey) {
            const a = adjust || {};
            const pos = (x) => Math.max(0, x);
            const brightness = 1 + (a.brightness || 0) / 100 + (a.exposure || 0) / 150
                                 + (a.shadow || 0) / 500 - (a.highlight || 0) / 500;
            const contrast   = 1 + (a.contrast || 0) / 100
                                 - (a.shadow || 0) / 600 + (a.highlight || 0) / 600;
            const saturate   = 1 + (a.saturation || 0) / 100;
            const parts = [
                `brightness(${pos(brightness).toFixed(3)})`,
                `contrast(${pos(contrast).toFixed(3)})`,
                `saturate(${pos(saturate).toFixed(3)})`,
            ];
            const preset = EDIT_FILTER_PRESETS[filterKey] || '';
            if (preset) parts.push(preset);
            return parts.join(' ');
        }

        // 按裁剪比例计算源图上的居中裁剪矩形（original/custom = 不裁剪）。
        function computeCropRect(sw, sh, ratio) {
            const map = { '1:1': 1, '4:3': 4 / 3, '16:9': 16 / 9 };
            const r = map[ratio];
            if (!r) return { sx: 0, sy: 0, cw: sw, ch: sh };
            let cw = sw, ch = sw / r;
            if (ch > sh) { ch = sh; cw = sh * r; }
            return { sx: (sw - cw) / 2, sy: (sh - ch) / 2, cw, ch };
        }

        // ---- 实时预览（无损 CSS，不落盘）：编辑窗每次变化即时反映到照片 ----
        let previewEdits = null;   // 当前预览中的编辑；null = 无预览

        // 把裁剪比例转成 clip-path inset（在图片自身坐标系内，缩放/平移之前生效）。
        function computeClipPath(crop) {
            const sw = photoImage.naturalWidth, sh = photoImage.naturalHeight;
            if (!sw || !sh) return 'none';
            const { sx, sy, cw, ch } = computeCropRect(sw, sh, crop);
            if (sx === 0 && sy === 0 && cw === sw && ch === sh) return 'none';
            const top = (sy / sh) * 100, bottom = ((sh - sy - ch) / sh) * 100;
            const left = (sx / sw) * 100, right = ((sw - sx - cw) / sw) * 100;
            return `inset(${top.toFixed(3)}% ${right.toFixed(3)}% ${bottom.toFixed(3)}% ${left.toFixed(3)}%)`;
        }

        function applyPreview(edits) {
            previewEdits = edits || null;
            if (!previewEdits) { clearPreview(); return; }
            photoImage.style.filter = buildEditFilter(edits.adjust, edits.filter);
            photoImage.style.clipPath = computeClipPath(edits.crop);
            updateTransform();   // 把 rotate/flip 合成进缩放/平移
        }

        function clearPreview() {
            previewEdits = null;
            photoImage.style.filter = '';
            photoImage.style.clipPath = '';
            updateTransform();
        }

        // 把当前 photoImage 按 edits 渲染到离屏 canvas，返回 dataURL。
        function renderEditedImage(edits) {
            const sw = photoImage.naturalWidth, sh = photoImage.naturalHeight;
            if (!sw || !sh) return null;
            const { sx, sy, cw, ch } = computeCropRect(sw, sh, edits.crop);
            const rot = (((edits.rotation || 0) % 360) + 360) % 360;
            const swap = rot === 90 || rot === 270;
            const outW = Math.round(swap ? ch : cw);
            const outH = Math.round(swap ? cw : ch);

            const canvas = document.createElement('canvas');
            canvas.width = outW; canvas.height = outH;
            const ctx = canvas.getContext('2d');
            ctx.save();
            ctx.translate(outW / 2, outH / 2);
            ctx.rotate(rot * Math.PI / 180);
            ctx.scale(edits.flipH ? -1 : 1, edits.flipV ? -1 : 1);
            ctx.filter = buildEditFilter(edits.adjust, edits.filter);
            ctx.drawImage(photoImage, sx, sy, cw, ch, -cw / 2, -ch / 2, cw, ch);
            ctx.restore();

            const isPng = /\.png$/i.test(currentPhoto.filename || '');
            return canvas.toDataURL(isPng ? 'image/png' : 'image/jpeg', 0.95);
        }

        ipcRenderer.on('photo-edit-applied', async (_event, { photo, edits }) => {
            try {
                if (!currentPhoto || currentPhoto.type === 'video') return;
                // 先把无损 CSS 预览清掉，避免在“已编辑”的落盘结果上二次叠加
                // （renderEditedImage 用的是 photoImage 原始位图 + canvas 滤镜，不受影响）
                const dataUrl = renderEditedImage(edits);
                clearPreview();
                if (!dataUrl) { console.warn('[photo-edit] 渲染失败：图片尚未就绪'); return; }
                const res = await ipcRenderer.invoke('save-edited-photo', {
                    mode:            edits.saveMode || 'copy',
                    originalPhotoId: currentPhoto.id,
                    directory:       currentPhoto.directory,
                    filename:        currentPhoto.filename,
                    fullPath:        currentPhoto.fullPath,
                    dataUrl,
                });
                if (!res || !res.success) {
                    console.error('[photo-edit] 保存失败:', res && res.error);
                    return;
                }
                if (res.mode === 'copy' && res.photo) {
                    // 另存副本：作为独立照片跳转显示，插入导航列表，并通知主窗刷新地图
                    currentPhoto = res.photo;
                    await loadPhoto(res.photo);
                    await ipcRenderer.invoke('insert-edited-copy-into-nav', res.photo);
                    await ipcRenderer.invoke('refresh-map-photos', res.photo);
                    console.log('[photo-edit] 已另存为新照片并跳转:', res.path);
                } else if (res.mode === 'overwrite' && res.renamed) {
                    // 覆盖原图但格式改变（如 HEIC→JPG）：文件名已更新，同步导航项与地图后重载
                    currentPhoto.filename = res.filename;
                    currentPhoto.fullPath = res.path;
                    await ipcRenderer.invoke('update-current-nav-entry', currentPhoto);
                    await ipcRenderer.invoke('refresh-map-photos', currentPhoto);
                    await loadPhoto(currentPhoto);
                    console.log('[photo-edit] 已覆盖原图（改名）:', res.path);
                } else {
                    // 覆盖原图（原地写回）：刷新当前视图，加时间戳绕过缓存
                    photoImage.onload = () => { resetZoom(); };
                    photoImage.src = pathToFileURL(res.path).href + '?t=' + Date.now();
                    console.log('[photo-edit] 已覆盖原图:', res.path);
                }
            } catch (err) {
                console.error('[photo-edit] 应用编辑出错:', err);
            }
        });

        // 实时预览：编辑窗每次变化即时反映到照片（无损 CSS，不落盘）
        ipcRenderer.on('photo-edit-preview', (_event, { edits }) => {
            if (!currentPhoto || currentPhoto.type === 'video') return;
            applyPreview(edits);
        });

        // 取消/退出编辑：清除预览，恢复原图
        ipcRenderer.on('photo-edit-cancelled', (_event, { photo }) => {
            clearPreview();
            console.log('[photo-edit] 已取消编辑，恢复原图', photo && photo.filename);
        });

        // 鼠标滚轮缩放 - 在body上捕获所有wheel事件
        document.body.addEventListener('wheel', function(e) {
            // 检查鼠标是否在照片容器区域
            const rect = photoContainer.getBoundingClientRect();
            
            if (e.clientX >= rect.left && e.clientX <= rect.right && 
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                e.preventDefault();
                e.stopImmediatePropagation();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const minScale = getMinScale();
                const newScale = scale + delta;
                scale = Math.max(minScale, Math.min(5, newScale));
                updateTransform();
            }
        }, { passive: false, capture: true });

        // 拖动功能
        photoContainer.addEventListener('mousedown', (e) => {
            // 检查是否需要拖动（媒体超出容器）
            const containerWidth = photoContainer.clientWidth;
            const containerHeight = photoContainer.clientHeight;
            
            let imageWidth, imageHeight;
            if (videoPlayer.classList.contains('active')) {
                imageWidth = videoPlayer.videoWidth || containerWidth;
                imageHeight = videoPlayer.videoHeight || containerHeight;
            } else {
                imageWidth = photoImage.naturalWidth || containerWidth;
                imageHeight = photoImage.naturalHeight || containerHeight;
            }
            
            // 计算实际显示尺寸
            const containerAspect = containerWidth / containerHeight;
            const imageAspect = imageWidth / imageHeight;
            let displayWidth, displayHeight;
            
            if (imageAspect > containerAspect) {
                displayWidth = Math.min(imageWidth, containerWidth);
                displayHeight = displayWidth / imageAspect;
            } else {
                displayHeight = Math.min(imageHeight, containerHeight);
                displayWidth = displayHeight * imageAspect;
            }
            
            const scaledWidth = displayWidth * scale;
            const scaledHeight = displayHeight * scale;
            
            // 如果缩放后的尺寸超出容器，允许拖动
            if (scaledWidth > containerWidth || scaledHeight > containerHeight) {
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                photoContainer.classList.add('dragging');
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                constrainTranslation();
                updateTransform();
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            photoContainer.classList.remove('dragging');
        });

        // 限制平移范围，防止露出背景
        function constrainTranslation() {
            // 获取容器尺寸
            const containerWidth = photoContainer.clientWidth;
            const containerHeight = photoContainer.clientHeight;

            // 获取媒体实际显示尺寸（自然尺寸）
            let imageWidth, imageHeight;
            if (videoPlayer.classList.contains('active')) {
                imageWidth = videoPlayer.videoWidth || containerWidth;
                imageHeight = videoPlayer.videoHeight || containerHeight;
            } else {
                imageWidth = photoImage.naturalWidth;
                imageHeight = photoImage.naturalHeight;
            }

            // 计算照片在容器中的实际渲染尺寸（考虑max-width/max-height）
            let displayWidth = imageWidth;
            let displayHeight = imageHeight;
            
            // 模拟CSS的contain行为
            const containerAspect = containerWidth / containerHeight;
            const imageAspect = imageWidth / imageHeight;
            
            if (imageAspect > containerAspect) {
                // 图片更宽，以宽度为准
                displayWidth = Math.min(imageWidth, containerWidth);
                displayHeight = displayWidth / imageAspect;
            } else {
                // 图片更高，以高度为准
                displayHeight = Math.min(imageHeight, containerHeight);
                displayWidth = displayHeight * imageAspect;
            }

            // 计算缩放后的尺寸
            const scaledWidth = displayWidth * scale;
            const scaledHeight = displayHeight * scale;

            // 计算最大允许的偏移量（缩放后的图片边缘不能超出容器）
            const maxTranslateX = Math.max(0, (scaledWidth - containerWidth) / 2);
            const maxTranslateY = Math.max(0, (scaledHeight - containerHeight) / 2);

            // 限制平移范围
            translateX = Math.max(-maxTranslateX, Math.min(maxTranslateX, translateX));
            translateY = Math.max(-maxTranslateY, Math.min(maxTranslateY, translateY));
        }

        // 更新变换
        function updateTransform() {
            constrainTranslation();
            let transformValue = `scale(${scale}) translate(${translateX / scale}px, ${translateY / scale}px)`;

            // 实时预览的旋转/翻转：作为最内层变换附加（先转再缩放平移）
            if (typeof previewEdits !== 'undefined' && previewEdits &&
                !videoPlayer.classList.contains('active')) {
                const rot = (((previewEdits.rotation || 0) % 360) + 360) % 360;
                const sx = previewEdits.flipH ? -1 : 1;
                const sy = previewEdits.flipV ? -1 : 1;
                if (rot) transformValue += ` rotate(${rot}deg)`;
                if (sx !== 1 || sy !== 1) transformValue += ` scale(${sx}, ${sy})`;
            }

            // 确保正确的元素被应用transform
            const activeElement = videoPlayer.classList.contains('active') ? videoPlayer : photoImage;
            activeElement.style.transform = transformValue;

            zoomLevel.textContent = `${Math.round(scale * 100)}%`;
        }

        // 重置缩放
        function resetZoom() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        // 计算最小缩放值（确保至少一边等于容器）
        function getMinScale() {
            const containerWidth = photoContainer.clientWidth;
            const containerHeight = photoContainer.clientHeight;
            
            let imageWidth, imageHeight;
            if (videoPlayer.classList.contains('active')) {
                imageWidth = videoPlayer.videoWidth || containerWidth;
                imageHeight = videoPlayer.videoHeight || containerHeight;
            } else {
                imageWidth = photoImage.naturalWidth || containerWidth;
                imageHeight = photoImage.naturalHeight || containerHeight;
            }
            
            if (!imageWidth || !imageHeight) {
                return 1; // 默认最小值
            }
            
            // 计算contain模式下的显示尺寸
            const containerAspect = containerWidth / containerHeight;
            const imageAspect = imageWidth / imageHeight;
            
            let displayWidth, displayHeight;
            if (imageAspect > containerAspect) {
                // 图片更宽，以容器宽度为准
                displayWidth = containerWidth;
                displayHeight = containerWidth / imageAspect;
            } else {
                // 图片更高，以容器高度为准
                displayHeight = containerHeight;
                displayWidth = containerHeight * imageAspect;
            }
            
            // 在scale=1时，图片已经以contain方式适配
            // 最小scale就是1，不允许缩小，这样至少一边始终填满容器
            return 1;
        }

        // 初始化小地图（lat/lng 为 null 时显示世界视图供编辑）
        function initMiniMap(lat, lng) {
            // 退出编辑模式
            if (isEditingLocation) exitLocationEditMode();

            // 如果地图已存在，先移除
            if (miniMap) {
                miniMap.remove();
                miniMap = null;
                miniMapMarker = null;
            }

            const hasLocation = lat !== null && lng !== null;
            const centerLat = hasLocation ? lat : 20;
            const centerLng = hasLocation ? lng : 0;
            const zoom = hasLocation ? 13 : 2;

            // 等待DOM元素准备好
            setTimeout(() => {
                // 创建小地图
                miniMap = L.map('miniMap', {
                    center: [centerLat, centerLng],
                    zoom: zoom,
                    zoomControl: false,
                    attributionControl: false,
                    dragging: false,
                    scrollWheelZoom: true,
                    doubleClickZoom: false,
                    touchZoom: false
                });

                // 添加地图图层
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: ''
                }).addTo(miniMap);

                // 添加标签图层
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
                    attribution: '',
                    subdomains: 'abcd'
                }).addTo(miniMap);

                if (hasLocation) {
                    // 有坐标：添加标记，缩放时保持在中心（仅非编辑模式）
                    miniMapMarker = L.marker([lat, lng]).addTo(miniMap);
                    miniMap.on('zoomend', function() {
                        if (!isEditingLocation) {
                            miniMap.setView([lat, lng]);
                        }
                    });
                }

                // 调整地图大小
                setTimeout(() => {
                    miniMap.invalidateSize();
                }, 100);
            }, 50);
        }

        let _editMapLandmarkLayer = null;
        let _editMapLandmarkCircles = []; // [{circle, centerLatLng, radius, color}]

        // 判断地图当前可视范围四角是否都在圆形内部
        function _isMiniMapBoundsInsideCircle(bounds, centerLatLng, radiusMeters) {
            return [
                bounds.getNorthWest(),
                bounds.getNorthEast(),
                bounds.getSouthEast(),
                bounds.getSouthWest()
            ].every(corner => centerLatLng.distanceTo(corner) < radiusMeters);
        }

        // 根据缩放/平移更新地标圆圈透明度
        function _updateMiniMapLandmarkOpacity() {
            if (!miniMap || _editMapLandmarkCircles.length === 0) return;
            const bounds = miniMap.getBounds();
            for (const { circle, centerLatLng, radius, color } of _editMapLandmarkCircles) {
                if (_isMiniMapBoundsInsideCircle(bounds, centerLatLng, radius)) {
                    circle.setStyle({ opacity: 0, fillOpacity: 0 });
                } else {
                    circle.setStyle({ opacity: 0.6, fillOpacity: 0.15, color, fillColor: color });
                }
            }
        }

        // 在编辑地图上加载地标 tag
        async function loadLandmarksOnEditMap() {
            if (!miniMap) return;
            try {
                const tags = await ipcRenderer.invoke('get-location-tags');
                if (!tags || tags.length === 0) return;

                if (_editMapLandmarkLayer) {
                    miniMap.removeLayer(_editMapLandmarkLayer);
                }
                _editMapLandmarkLayer = L.layerGroup().addTo(miniMap);
                _editMapLandmarkCircles = [];

                const flagIcon = L.divIcon({
                    html: '<span style="font-size:14px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))">&#x1F6A9;</span>',
                    className: '',
                    iconSize: [14, 14],
                    iconAnchor: [3, 14]
                });

                for (const tag of tags) {
                    const color = tag.color || '#e53935';
                    const radius = tag.radius || 10;
                    const centerLatLng = L.latLng(tag.lat, tag.lng);
                    const circle = L.circle(centerLatLng, {
                        radius,
                        color,
                        weight: 1.5,
                        fillColor: color,
                        fillOpacity: 0.15,
                        opacity: 0.6
                    });
                    circle.bindTooltip(tag.name, { direction: 'top', offset: [0, -4] });
                    circle.addTo(_editMapLandmarkLayer);
                    L.marker(centerLatLng, { icon: flagIcon, interactive: false })
                        .addTo(_editMapLandmarkLayer);
                    _editMapLandmarkCircles.push({ circle, centerLatLng, radius, color });
                }

                miniMap.on('zoomend moveend', _updateMiniMapLandmarkOpacity);
                _updateMiniMapLandmarkOpacity();
            } catch (e) {
                console.error('加载地标到编辑地图失败:', e);
            }
        }

        // 从编辑地图移除地标 tag
        function removeLandmarksFromEditMap() {
            if (miniMap) {
                miniMap.off('zoomend moveend', _updateMiniMapLandmarkOpacity);
            }
            if (_editMapLandmarkLayer && miniMap) {
                miniMap.removeLayer(_editMapLandmarkLayer);
                _editMapLandmarkLayer = null;
            }
            _editMapLandmarkCircles = [];
        }

        // ── 地图/地标 内部 Tab ────────────────────────────────────
        let selectedLandmarkTag = null;

        function switchLocTab(tabName) {
            document.querySelectorAll('.loc-tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.loctab === tabName);
            });
            if (tabName === 'map') {
                document.getElementById('mapTabPanel').style.display = 'block';
                document.getElementById('landmarkTabPanel').style.display = 'none';
                if (miniMap) setTimeout(() => miniMap.invalidateSize(), 50);
            } else {
                document.getElementById('mapTabPanel').style.display = 'none';
                document.getElementById('landmarkTabPanel').style.display = 'block';
                loadLandmarkTree();
            }
        }

        document.getElementById('locTabNav').addEventListener('click', (e) => {
            const btn = e.target.closest('.loc-tab-btn');
            if (btn && isEditingLocation) switchLocTab(btn.dataset.loctab);
        });

        async function loadLandmarkTree() {
            const container = document.getElementById('landmarkTreeContainer');
            // 避免重复加载
            if (container.dataset.loaded === 'true') return;
            container.innerHTML = '<div style="color:#555;font-size:11px;padding:8px 10px;">加载中...</div>';
            try {
                const tree = await ipcRenderer.invoke('get-location-tag-tree');
                container.innerHTML = '';
                if (!tree || tree.length === 0) {
                    container.innerHTML = '<div style="color:#555;font-size:11px;padding:8px 10px;">暂无地标</div>';
                    return;
                }
                renderLandmarkTree(tree, container);
                container.dataset.loaded = 'true';
            } catch (e) {
                console.error('加载地标树失败:', e);
                container.innerHTML = '<div style="color:#555;font-size:11px;padding:8px 10px;">加载失败</div>';
            }
        }

        function renderLandmarkTree(nodes, container, depth = 0) {
            for (const node of nodes) {
                const hasLoc = node.lat !== null && node.lat !== undefined;
                const hasChildren = node.children && node.children.length > 0;

                const nodeEl = document.createElement('div');
                nodeEl.className = 'landmark-node' + (hasLoc ? '' : ' no-location');
                nodeEl.style.paddingLeft = `${8 + depth * 14}px`;

                const toggle = document.createElement('span');
                toggle.className = 'node-toggle';
                toggle.textContent = hasChildren ? '▶' : '';
                nodeEl.appendChild(toggle);

                const dot = document.createElement('span');
                dot.className = 'node-dot';
                dot.style.backgroundColor = node.color || '#3498db';
                nodeEl.appendChild(dot);

                const name = document.createElement('span');
                name.className = 'node-name';
                name.textContent = node.name;
                nodeEl.appendChild(name);

                if (hasLoc) {
                    const locIcon = document.createElement('span');
                    locIcon.className = 'node-loc-icon';
                    locIcon.textContent = '📍';
                    nodeEl.appendChild(locIcon);
                }

                container.appendChild(nodeEl);

                let childrenEl = null;
                if (hasChildren) {
                    childrenEl = document.createElement('div');
                    childrenEl.style.display = 'none';
                    renderLandmarkTree(node.children, childrenEl, depth + 1);
                    container.appendChild(childrenEl);
                }

                nodeEl.addEventListener('click', () => {
                    // 展开/折叠子节点
                    if (childrenEl) {
                        const expanded = childrenEl.style.display !== 'none';
                        childrenEl.style.display = expanded ? 'none' : 'block';
                        toggle.textContent = expanded ? '▶' : '▼';
                    }
                    // 选中有定位的节点
                    if (hasLoc) {
                        document.querySelectorAll('#landmarkTreeContainer .landmark-node.selected')
                            .forEach(n => n.classList.remove('selected'));
                        nodeEl.classList.add('selected');
                        selectedLandmarkTag = node;
                        document.getElementById('landmarkConfirmBtn').disabled = false;
                    }
                });
            }
        }

        // 地址搜索
        async function searchAddress(query) {
            // 先判断是否为直接输入的坐标（如 39.123456, 116.123456）
            const coordMatch = query.match(/^(-?\d+\.?\d*)\s*[,，]\s*(-?\d+\.?\d*)$/);
            if (coordMatch) {
                const lat = parseFloat(coordMatch[1]);
                const lng = parseFloat(coordMatch[2]);
                if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
                    document.getElementById('locationSearchResults').style.display = 'none';
                    document.getElementById('locationSearchInput').value = '';
                    miniMap.setView([lat, lng], 14);
                    return;
                }
            }

            const resultsEl = document.getElementById('locationSearchResults');
            resultsEl.style.display = 'block';
            resultsEl.innerHTML = `<div class="search-status-item">${i18n.t('photo.searching')}</div>`;
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5`,
                    { headers: { 'User-Agent': 'GeoPhoto/1.0' } }
                );
                const data = await res.json();
                if (!data || data.length === 0) {
                    resultsEl.innerHTML = `<div class="search-status-item">${i18n.t('photo.noResults')}</div>`;
                    return;
                }
                resultsEl.innerHTML = '';
                for (const item of data) {
                    const div = document.createElement('div');
                    div.className = 'search-result-item';
                    div.textContent = item.display_name;
                    div.addEventListener('click', () => {
                        miniMap.setView([parseFloat(item.lat), parseFloat(item.lon)], 14);
                        resultsEl.style.display = 'none';
                        document.getElementById('locationSearchInput').value = '';
                    });
                    resultsEl.appendChild(div);
                }
            } catch (_) {
                resultsEl.innerHTML = `<div class="search-status-item">${i18n.t('photo.searchFailed')}</div>`;
            }
        }

        function createNearbyPhotoItem(photo) {
            const hasLoc = !!(photo.lat && photo.lng);
            const item = document.createElement('div');
            item.className = 'nearby-photo-item' + (hasLoc ? '' : ' no-location');
            item.title = photo.filename + (hasLoc ? `\n${photo.lat.toFixed(4)}, ${photo.lng.toFixed(4)}` : '\n无定位');

                const icon = document.createElement('div');
                icon.className = 'nearby-photo-video';
                icon.textContent = '🎬';
                item.appendChild(icon);
            } else {
                const img = document.createElement('img');
                img.className = 'nearby-photo-thumb';
                if (photo.fullPath) {
                    img.src = pathToFileURL(photo.fullPath).href;
                }
                img.onerror = () => {
                    img.style.display = 'none';
                    const fb = document.createElement('div');
                    fb.className = 'nearby-photo-video';
                    fb.textContent = '🖼';
                    item.insertBefore(fb, img);

            loc.textContent = hasLoc ? '📍' : '—';

        (function () {
            const { clipboard } = require('electron');
            const coordEl    = document.getElementById('info-coordinates');
            const copyBtn    = document.getElementById('coordCopyBtn');
            const locateBtn  = document.getElementById('coordLocateBtn');
            copyBtn.title   = i18n.t('photo.coordCopyTitle');
            locateBtn.title = i18n.t('photo.coordLocateTitle');

            // 更新按钮可用状态（loadPhoto 后调用）

                const hasCoord = !!(currentPhoto && currentPhoto.lat != null && currentPhoto.lng != null);
                copyBtn.disabled   = !hasCoord;
                locateBtn.disabled = !hasCoord;
            }
            window._updateCoordBtns = updateCoordBtns;

            // 复制坐标按钮
            copyBtn.addEventListener('click', () => {
                const text = coordEl.textContent.trim();

            });

            // 定位到地图按钮：发 IPC，主进程负责关窗 + 定位
            locateBtn.addEventListener('click', () => {
                if (!currentPhoto || currentPhoto.lat == null) return;
                ipcRenderer.send('locate-photo-on-main-map', {
                    lat: currentPhoto.lat,
                    lng: currentPhoto.lng
                });
            });

            /**
             * 解析剪贴板文字中的地理坐标，返回 { lat, lng } 或 null。
             * 支持常见格式：
             *   "39.9042, 116.4074"         (十进制，逗号/空格分隔)
             *   "39.9042°N, 116.4074°E"     (十进制 + 方向字母)
             *   "N39.9042, E116.4074"       (方向字母前置)
             */
            function parseGeoCoord(text) {
                if (!text) return null;
                text = text.trim();
                function valid(lat, lng) {
                    return lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180;
                }
                // 格式1: "-90.123, -180.456" 或 "39.9 116.4"
                let m = text.match(/^(-?\d{1,3}(?:\.\d+)?)\s*°?\s*[,\s]\s*(-?\d{1,3}(?:\.\d+)?)\s*°?$/);
                if (m) {
                    const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
                    if (valid(lat, lng)) return { lat, lng };
                }
                // 格式2: "39.9042°N, 116.4074°E"
                m = text.match(/(\d{1,3}(?:\.\d+)?)\s*°?\s*([NS])\s*[,\s]\s*(\d{1,3}(?:\.\d+)?)\s*°?\s*([EW])/i);
                if (m) {
                    let lat = parseFloat(m[1]), lng = parseFloat(m[3]);
                    if (/s/i.test(m[2])) lat = -lat;
                    if (/w/i.test(m[4])) lng = -lng;
                    if (valid(lat, lng)) return { lat, lng };
                }
                // 格式3: "N39.9042, E116.4074"
                m = text.match(/([NS])\s*(\d{1,3}(?:\.\d+)?)\s*°?\s*[,\s]\s*([EW])\s*(\d{1,3}(?:\.\d+)?)\s*°?/i);
                if (m) {
                    let lat = parseFloat(m[2]), lng = parseFloat(m[4]);
                    if (/s/i.test(m[1])) lat = -lat;
                    if (/w/i.test(m[3])) lng = -lng;
                    if (valid(lat, lng)) return { lat, lng };
                }
                return null;
            }

            // 点击无坐标文本 → 尝试从剪贴板粘贴
            coordEl.addEventListener('click', async () => {
                if (!currentPhoto || (currentPhoto.lat != null)) return;
                const coord = parseGeoCoord(clipboard.readText());
                if (!coord) return;

                const { lat, lng } = coord;
                await ipcRenderer.invoke('update-photo-location', { photoId: currentPhoto.id, lat, lng });
                currentPhoto.lat = lat;
                currentPhoto.lng = lng;

                coordEl.textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                document.getElementById('info-location').textContent = i18n.t('photo.loading');
                try {
                    const cityName = await ipcRenderer.invoke('get-city-name', { lat, lng });
                    document.getElementById('info-location').textContent = cityName;
                } catch (_) {
                    document.getElementById('info-location').textContent = i18n.t('photo.failedLoad');
                }

                if (miniMap) {
                    if (miniMapMarker) miniMap.removeLayer(miniMapMarker);
                    miniMapMarker = L.marker([lat, lng]).addTo(miniMap);
                    miniMap.setView([lat, lng], Math.max(miniMap.getZoom(), 14));
                    miniMap.off('zoomend');
                    miniMap.on('zoomend', function() {
                        if (!isEditingLocation) miniMap.setView([lat, lng]);
                    });
                }
                updateCoordBtns();
            });
        })();
