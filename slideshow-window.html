<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Slideshow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            user-select: none;
            cursor: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        body.show-cursor { cursor: default; }

        /* ── 双槽叠层 ─────────────────────────────────────── */
        #stage {
            position: absolute;
            inset: 0;
        }
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;   /* 由 JS 用 Web Animations API 控制 */
        }
        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }
        .slide video {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        /* ── UI 覆盖层 ────────────────────────────────────── */
        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* 底部中央信息条 */
        #slideshow-info {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.45);
            color: #e0e0e0;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 20px;
            white-space: nowrap;
            display: flex;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* 左下角备注 */
        #slideshow-remark {
            position: absolute;
            bottom: 18px;
            left: 20px;
            max-width: 40vw;
            background: rgba(0,0,0,0.5);
            color: #f0f0f0;
            font-size: 14px;
            line-height: 1.5;
            padding: 6px 14px;
            border-radius: 10px;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
        }

        /* 右下角红心 */
        #slideshow-like {
            position: absolute;
            bottom: 18px;
            right: 20px;
            font-size: 32px;
            color: #ff4444;
            display: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        /* 右上角标签列表 */
        #slideshow-tags {
            position: absolute;
            top: 18px;
            right: 20px;
            display: none;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            max-width: 30vw;
        }
        .slideshow-tag {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            color: #fff;
            background: rgba(60,60,60,0.7);
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── 控制按钮 ─────────────────────────────────────── */
        #slideshow-close,
        #slideshow-prev,
        #slideshow-next,
        #slideshow-playpause {
            position: absolute;
            background: rgba(0,0,0,0.35);
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 50%;
            line-height: 1;
            opacity: 0;
            pointer-events: auto;
            transition: opacity 0.2s, background 0.2s;
            z-index: 10;
        }
        #slideshow-close:hover,
        #slideshow-prev:hover,
        #slideshow-next:hover,
        #slideshow-playpause:hover {
            opacity: 1 !important;
            background: rgba(0,0,0,0.7);
        }
        #slideshow-close {
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px; height: 44px; font-size: 20px;
        }
        #slideshow-prev, #slideshow-next {
            top: 50%;
            transform: translateY(-50%);
            width: 56px; height: 56px; font-size: 40px;
            display: flex; align-items: center; justify-content: center;
        }
        #slideshow-prev { left: 20px; }
        #slideshow-next { right: 20px; }
        #slideshow-playpause {
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px; height: 44px; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }

        body.show-cursor #slideshow-close,
        body.show-cursor #slideshow-prev,
        body.show-cursor #slideshow-next,
        body.show-cursor #slideshow-playpause,
        body.show-cursor #slideshow-info { opacity: 0.55; }
    </style>
</head>
<body>
    <div id="stage">
        <div class="slide" id="slot-a"><img src="" alt=""><video preload="auto"></video></div>
        <div class="slide" id="slot-b"><img src="" alt=""><video preload="auto"></video></div>
    </div>

    <div id="ui-layer">
        <div id="slideshow-info">
            <span id="slideshow-counter"></span>
            <span id="slideshow-date"></span>
        </div>
        <div id="slideshow-remark"></div>
        <div id="slideshow-like">&#10084;</div>
        <div id="slideshow-tags"></div>
    </div>

    <button id="slideshow-close">&#10005;</button>
    <button id="slideshow-prev">&#8249;</button>
    <button id="slideshow-next">&#8250;</button>
    <button id="slideshow-playpause">&#9646;&#9646;</button>

    <script>
        const { ipcRenderer } = require('electron');
        const { pathToFileURL } = require('url');

        const PHOTO_DURATION = 10000;
        const FADE_DURATION  = 1000;

        const counterEl    = document.getElementById('slideshow-counter');
        const dateEl       = document.getElementById('slideshow-date');
        const remarkEl     = document.getElementById('slideshow-remark');
        const likeEl       = document.getElementById('slideshow-like');
        const tagsEl       = document.getElementById('slideshow-tags');
        const closeBtn     = document.getElementById('slideshow-close');
        const prevBtn      = document.getElementById('slideshow-prev');
        const nextBtn      = document.getElementById('slideshow-next');
        const playPauseBtn = document.getElementById('slideshow-playpause');

        function makeSlot(id) {
            const el    = document.getElementById(id);
            const img   = el.querySelector('img');
            const video = el.querySelector('video');
            return { el, img, video };
        }
        const slotA = makeSlot('slot-a');
        const slotB = makeSlot('slot-b');

        let curSlot = slotA;   // 当前可见槽（opacity = 1）
        let bgSlot  = slotB;   // 后台槽（opacity = 0，用来装下一张）

        let photos          = [];
        let index           = 0;
        let paused          = false;
        let autoTimer       = null;    // 照片自动前进定时器
        let transitionTimer = null;    // 淡化完成定时器
        let outgoingAnim    = null;    // 淡出动画引用
        let incomingAnim    = null;    // 淡入动画引用

        // ── 鼠标隐藏/显示 ───────────────────────────────────
        let cursorHideTimer = null;
        function showCursor() {
            document.body.classList.add('show-cursor');
            clearTimeout(cursorHideTimer);
            cursorHideTimer = setTimeout(() => document.body.classList.remove('show-cursor'), 2500);
        }
        document.addEventListener('mousemove', showCursor);

        // ── 工具 ────────────────────────────────────────────
        function fmtDate(isoStr) {
            if (!isoStr) return '';
            const d = new Date(isoStr);
            if (isNaN(d)) return isoStr;
            return d.toLocaleDateString(undefined, { year: 'numeric', month: '2-digit', day: '2-digit' })
                 + '  ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        }

        function clearAutoTimer() {
            if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
        }

        // 中断当前正在进行的交叉淡化，把 curSlot 瞬间定格为完全可见
        function abortTransition() {
            if (!transitionTimer && !outgoingAnim) return;
            if (transitionTimer)  { clearTimeout(transitionTimer); transitionTimer = null; }
            if (outgoingAnim)     { outgoingAnim.cancel(); outgoingAnim = null; }
            if (incomingAnim)     { incomingAnim.cancel(); incomingAnim = null; }
            // 强制 curSlot（入场槽）完全不透明，bgSlot（出场槽）完全透明
            curSlot.el.style.opacity = '1';
            bgSlot.el.style.opacity  = '0';
        }

        // 清空 bgSlot 内容并设为完全透明
        function clearBgSlot() {
            bgSlot.el.style.opacity  = '0';
            bgSlot.video.pause();
            bgSlot.video.onended     = null;
            bgSlot.video.src         = '';
            bgSlot.img.src           = '';
            bgSlot.img.style.display   = 'none';
            bgSlot.video.style.display = 'none';
        }

        // ── 备注 / 红心 / 标签 ──────────────────────────────
        function updateMeta(photo) {
            if (photo.remark && photo.remark.trim()) {
                remarkEl.textContent   = photo.remark.trim();
                remarkEl.style.display = 'block';
            } else {
                remarkEl.style.display = 'none';
            }

            likeEl.style.display = photo.like ? 'block' : 'none';

            tagsEl.innerHTML     = '';
            tagsEl.style.display = 'none';
            if (photo.id) {
                ipcRenderer.invoke('get-photo-tags', { photoId: photo.id }).then(result => {
                    if (result && result.success && result.tags && result.tags.length > 0) {
                        result.tags.forEach(tag => {
                            const span = document.createElement('span');
                            span.className   = 'slideshow-tag';
                            span.textContent = tag.name;
                            if (tag.color) span.style.background = tag.color + 'cc';
                            tagsEl.appendChild(span);
                        });
                        tagsEl.style.display = 'flex';
                    }
                }).catch(() => {});
            }
        }

        // ── 主显示函数 ───────────────────────────────────────
        function show(i) {
            clearAutoTimer();
            abortTransition();          // 中断正在进行的淡化
            curSlot.video.pause();      // 暂停当前视频
            curSlot.video.onended = null;
            clearBgSlot();              // 清空后台槽

            index = i;
            const photo    = photos[index];
            const filePath = photo.fullPath || (photo.directory + '/' + photo.filename);
            const fileUrl  = pathToFileURL(filePath).href;

            counterEl.textContent = (index + 1) + ' / ' + photos.length;
            dateEl.textContent    = fmtDate(photo.time);
            updateMeta(photo);

            // 向 bgSlot 装入新内容（视频只预加载，淡化完成后再 play）
            if (photo.type === 'video') {
                bgSlot.video.src           = fileUrl;
                bgSlot.video.currentTime   = 0;
                bgSlot.video.style.display = 'block';
            } else {
                bgSlot.img.src           = fileUrl;
                bgSlot.img.style.display = 'block';
            }

            const outgoing = curSlot;
            const incoming = bgSlot;
            curSlot = incoming;   // 新内容从此成为 curSlot
            bgSlot  = outgoing;

            // ── 同时启动淡出 / 淡入（Web Animations API） ──
            outgoingAnim = outgoing.el.animate(
                [{ opacity: 1 }, { opacity: 0 }],
                { duration: FADE_DURATION, fill: 'forwards' }
            );
            incomingAnim = incoming.el.animate(
                [{ opacity: 0 }, { opacity: 1 }],
                { duration: FADE_DURATION, fill: 'forwards' }
            );

            // 淡化完成后收尾
            transitionTimer = setTimeout(() => {
                transitionTimer = null;
                outgoingAnim = null;
                incomingAnim = null;

                // 用 style 固定最终 opacity，然后可以 cancel fill:'forwards'
                outgoing.el.style.opacity = '0';
                incoming.el.style.opacity = '1';

                // 清空出场槽
                outgoing.video.pause();
                outgoing.video.onended     = null;
                outgoing.video.src         = '';
                outgoing.img.src           = '';
                outgoing.img.style.display   = 'none';
                outgoing.video.style.display = 'none';

                // 淡化完成，现在才开始播放视频或启动照片定时器
                if (!paused) {
                    if (photo.type === 'video') {
                        incoming.video.play().catch(() => {});
                        incoming.video.onended = () => { if (!paused) advance(1); };
                    } else {
                        autoTimer = setTimeout(() => advance(1), PHOTO_DURATION);
                    }
                }
            }, FADE_DURATION);
        }

        // ── 前进 / 后退 ──────────────────────────────────────
        function advance(dir) {
            const next = index + dir;
            if (next < 0 || next >= photos.length) { stop(); return; }
            show(next);
        }

        // ── 暂停 / 继续 ──────────────────────────────────────
        function togglePause() {
            paused = !paused;
            playPauseBtn.innerHTML = paused ? '&#9654;' : '&#9646;&#9646;';
            if (paused) {
                clearAutoTimer();
                curSlot.video.pause();
            } else {
                // 如果淡化仍在进行，等 transitionTimer 结束时自然启动
                if (!transitionTimer) {
                    const photo = photos[index];
                    if (photo.type === 'video') {
                        curSlot.video.play().catch(() => {});
                        curSlot.video.onended = () => { if (!paused) advance(1); };
                    } else {
                        autoTimer = setTimeout(() => advance(1), PHOTO_DURATION);
                    }
                }
            }
        }

        // ── 停止 ─────────────────────────────────────────────
        function stop() {
            clearAutoTimer();
            abortTransition();
            curSlot.video.pause();
            bgSlot.video.pause();
            ipcRenderer.send('slideshow-close');
        }

        closeBtn.addEventListener('click', stop);
        prevBtn.addEventListener('click',  () => { clearAutoTimer(); advance(-1); });
        nextBtn.addEventListener('click',  () => { clearAutoTimer(); advance(1); });
        playPauseBtn.addEventListener('click', togglePause);

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape')          stop();
            else if (e.key === 'ArrowLeft')  { clearAutoTimer(); advance(-1); }
            else if (e.key === 'ArrowRight') { clearAutoTimer(); advance(1); }
            else if (e.key === ' ')          { e.preventDefault(); togglePause(); }
        });

        ipcRenderer.on('load-slideshow', (_event, photoList) => {
            photos = photoList;
            index  = 0;
            paused = false;
            playPauseBtn.innerHTML = '&#9646;&#9646;';
            show(0);
        });
    </script>
</body>
</html>
